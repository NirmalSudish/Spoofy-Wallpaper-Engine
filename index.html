<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Lyrics Visualizer – Wallpaper Engine</title>
  <meta name="description" content="High-performance WebGL Spotify lyrics visualizer for Wallpaper Engine. TouchDesigner-style feedback loop, GLSL shaders, sentiment-reactive visuals." />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <!-- ──────────────────────────────────────────────────────────────────
       Layer 0 (z:1): WebGL canvas — full-screen effect pipeline
       Text is never rendered here directly.
       ────────────────────────────────────────────────────────────── -->
  <canvas id="glCanvas" aria-hidden="true"></canvas>

  <!-- ──────────────────────────────────────────────────────────────────
       Layer -1 (opacity:0): Offscreen text canvas.
       Used only as a pixel source (texture) for the WebGL pass.
       ────────────────────────────────────────────────────────────── -->
  <canvas id="textCanvas" aria-hidden="true"></canvas>

  <!-- ──────────────────────────────────────────────────────────────────
       Layer 10: HUD — track name + artist + progress bar (subtle, bottom-center)
       ────────────────────────────────────────────────────────────── -->
  <div id="hud" role="status" aria-live="polite">
    <img id="hud-album-art" src="" alt="" aria-hidden="true" />
    <canvas id="hud-visualizer" aria-hidden="true"></canvas>
    <div id="hud-track"></div>
    <div id="hud-artist"></div>
    <div id="hud-controls">
      <button id="btn-prev"  aria-label="Previous" title="Previous">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="5" width="2.5" height="14" rx="1.2"/>
          <path d="M19 5.5L9 12l10 6.5V5.5z"/>
        </svg>
      </button>
      <button id="btn-play"  aria-label="Play / Pause" title="Play / Pause">
        <!-- icon swapped by JS: pause when playing, play when paused -->
        <svg id="icon-pause" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6"  y="5" width="4" height="14" rx="1.5"/>
          <rect x="14" y="5" width="4" height="14" rx="1.5"/>
        </svg>
        <svg id="icon-play" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
          <path d="M7 4.5l13 7.5-13 7.5V4.5z"/>
        </svg>
      </button>
      <button id="btn-next"  aria-label="Next" title="Next">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="16.5" y="5" width="2.5" height="14" rx="1.2"/>
          <path d="M5 5.5l10 6.5L5 18.5V5.5z"/>
        </svg>
      </button>
    </div>
    <div id="hud-progress-rail">
      <div id="hud-progress-bar"></div>
    </div>
  </div>

  <!-- ──────────────────────────────────────────────────────────────────
       Sentiment library (UMD global — must load before ES modules)
       ────────────────────────────────────────────────────────────── -->
  <script src="src/lib/sentiment.min.js"></script>

  <!-- ──────────────────────────────────────────────────────────────────
       Main application entry (ES module)
       ────────────────────────────────────────────────────────────── -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
